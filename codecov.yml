coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - server
          - client
      server:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - server
      client:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - client
    patch:
      default:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - server
          - client
      server:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - server
      client:
        target: auto
        threshold: 0%
        base: auto
        flags:
          - client

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false
  show_carryforward_flags: true

flags:
  server:
    paths:
      - server/**
    carryforward: true
  client:
    paths:
      - client/**
    carryforward: true
